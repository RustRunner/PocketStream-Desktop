name: Release

on:
  push:
    tags:
      - "v*"

# Needed to create the draft GitHub release.
permissions:
  contents: write

jobs:
  release:
    name: Build, sign & draft (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # First gate: the tag must match the version in all three files.
      # This — not the build — is what prevents a release built from the
      # wrong commit / a forgotten version bump.
      - name: Version consistency gate
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $pkg = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $conf = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $cargoLine = Select-String -Path src-tauri/Cargo.toml `
            -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1
          $cargo = $cargoLine.Matches[0].Groups[1].Value
          Write-Host "tag=$tag package.json=$pkg tauri.conf.json=$conf Cargo.toml=$cargo"
          if ($pkg -ne $tag -or $conf -ne $tag -or $cargo -ne $tag) {
            throw "Version mismatch: tag '$tag' but package.json=$pkg, tauri.conf.json=$conf, Cargo.toml=$cargo. Run bump-version.ps1 so all three match the tag."
          }

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Same pinned-MSI install as ci.yml. 1.26.11 is the newest
      # MSI-based GStreamer (1.28+ ship a single .exe). Installs under
      # Program Files; the environment step auto-detects the real root.
      - name: Install GStreamer (MSVC x86_64)
        shell: pwsh
        run: |
          $base = 'https://gstreamer.freedesktop.org/data/pkg/windows/1.26.11/msvc'
          $msis = @(
            @{ Name = 'gstreamer-1.0-msvc-x86_64-1.26.11.msi'
               Sha256 = '31CBC21FA0950B5C1E79C80959B2799805CB05A7A35953A13A9F790776137605' },
            @{ Name = 'gstreamer-1.0-devel-msvc-x86_64-1.26.11.msi'
               Sha256 = 'AF0A0720692052AAF5FB0CF2847EF34A87016EF0F914328D516F049E6C86F587' }
          )
          foreach ($msi in $msis) {
            $path = Join-Path $env:RUNNER_TEMP $msi.Name
            curl.exe -fsSL --retry 3 --retry-delay 5 -o $path "$base/$($msi.Name)"
            if ($LASTEXITCODE -ne 0) { throw "download failed: $($msi.Name)" }
            $hash = (Get-FileHash -Path $path -Algorithm SHA256).Hash
            if ($hash -ne $msi.Sha256) {
              throw "SHA256 mismatch for $($msi.Name): expected $($msi.Sha256), got $hash"
            }
            $proc = Start-Process msiexec.exe -Wait -PassThru `
              -ArgumentList '/i', $path, '/qn', 'ADDLOCAL=ALL'
            if ($proc.ExitCode -ne 0) {
              throw "msiexec exit $($proc.ExitCode) for $($msi.Name)"
            }
          }

      - name: Configure GStreamer environment
        shell: pwsh
        run: |
          # The MSVC MSIs install to C:\Program Files\gstreamer (NOT
          # C:\gstreamer) and register GSTREAMER_1_0_ROOT_MSVC_X86_64.
          # Read that real root (machine then user scope), falling back to
          # the known default, and derive everything from it. GStreamer
          # bundles pkg-config.exe in bin/ and it self-locates its own .pc
          # files, so putting bin/ on PATH is all that's needed - no
          # separate pkg-config install. The trailing backslash on the
          # root matters: gstreamer-rs concatenates paths raw in places.
          $root = [Environment]::GetEnvironmentVariable('GSTREAMER_1_0_ROOT_MSVC_X86_64','Machine')
          if (-not $root) { $root = [Environment]::GetEnvironmentVariable('GSTREAMER_1_0_ROOT_MSVC_X86_64','User') }
          if (-not $root) { $root = 'C:\Program Files\gstreamer\1.0\msvc_x86_64\' }
          $root = $root.TrimEnd('\')
          $pc = Join-Path $root 'lib\pkgconfig\glib-2.0.pc'
          if (-not (Test-Path $pc)) { throw "glib-2.0.pc not found at $pc - GStreamer root '$root' is wrong" }
          Write-Host "GStreamer root: $root"
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$root\" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG_PATH=$root\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - run: npm ci

      # The frontend dist/ must exist before any crate compile: tauri's
      # generate_context! macro (run during the clippy/test in Checks)
      # validates frontendDist ("../dist") and panics if it's missing.
      - run: npm run build

      # tauri-build validates the bundle resource globs whenever the crate
      # compiles — including the clippy in Checks below — so the resource
      # dirs must exist first. The real "Bundle GStreamer runtime" step
      # after Checks replaces these placeholders with the actual DLLs.
      - name: Create resource placeholders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\resources\gstreamer\bin | Out-Null
          New-Item -ItemType Directory -Force -Path src-tauri\resources\gstreamer\lib\gstreamer-1.0 | Out-Null
          New-Item -ItemType File -Force -Path src-tauri\resources\gstreamer\bin\.gitkeep | Out-Null
          New-Item -ItemType File -Force -Path src-tauri\resources\gstreamer\lib\gstreamer-1.0\.gitkeep | Out-Null

      # Same gates as CI, on the release commit.
      - name: Checks (typecheck, notices, fmt, clippy, test, audit)
        shell: pwsh
        run: |
          npm run typecheck
          if ($LASTEXITCODE -ne 0) { throw "typecheck failed" }
          ./scripts/check-third-party.ps1
          if ($LASTEXITCODE -ne 0) { throw "third-party notices check failed" }
          Push-Location src-tauri
          try {
            cargo fmt --check
            if ($LASTEXITCODE -ne 0) { throw "fmt failed" }
            cargo clippy --all-targets --no-deps --locked -- -D warnings
            if ($LASTEXITCODE -ne 0) { throw "clippy failed" }
            cargo test --lib --locked
            if ($LASTEXITCODE -ne 0) { throw "tests failed" }
            cargo install cargo-audit --locked --quiet
            # Advisory ignores are passed explicitly: cargo-audit does not
            # read a project-local audit.toml (only ~/.cargo/audit.toml),
            # so the file's ignores never applied. src-tauri/audit.toml is
            # kept as the rationale record; these flags mirror it.
            cargo audit --ignore RUSTSEC-2024-0413 --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
            if ($LASTEXITCODE -ne 0) { throw "audit failed" }
          } finally {
            Pop-Location
          }

      # Generate the Rust crate license notices the installer ships
      # (resources/licenses/generated/). Doubles as the license gate:
      # generation fails on a crate license missing from the about.toml
      # accept list. cargo-about's binary lives behind the `cli`
      # feature — installing without it "succeeds" with no binary.
      - name: Generate Rust crate notices
        shell: pwsh
        working-directory: src-tauri
        run: |
          cargo install cargo-about --locked --quiet --features cli
          if ($LASTEXITCODE -ne 0) { throw "cargo-about install failed" }
          cargo about generate about.hbs -o resources/licenses/generated/THIRD-PARTY-RUST.md
          if ($LASTEXITCODE -ne 0) { throw "cargo about generate failed" }

      # Stage the GStreamer runtime into resources/. The hardened script
      # fails on a version mismatch or any missing DLL, so a drifted SDK
      # can't ship a broken installer.
      - name: Bundle GStreamer runtime
        shell: pwsh
        run: pwsh -File scripts/bundle-gstreamer.ps1

      # Build + sign + assemble latest.json + publish as a DRAFT release.
      # POCKETSTREAM_RELEASE embeds the requireAdministrator manifest.
      # The draft is a deliberate human approval gate: the updater only
      # resolves published releases, so a bad build never auto-reaches the
      # fleet until someone publishes it.
      - name: Build, sign & draft release
        uses: tauri-apps/tauri-action@v0
        env:
          POCKETSTREAM_RELEASE: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PocketStream Desktop ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          # Trailing args after -- reach cargo: fail on a drifted
          # Cargo.lock instead of silently re-resolving at release time.
          args: -- --locked
