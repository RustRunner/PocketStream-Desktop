name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install GStreamer
        shell: pwsh
        run: |
          $tag = "deps"
          $repo = "${{ github.repository }}"
          $runtime = "gstreamer-1.0-msvc-x86_64-1.26.9.msi"
          $devel   = "gstreamer-1.0-devel-msvc-x86_64-1.26.9.msi"

          gh release download $tag --repo $repo --pattern $runtime --dir .
          gh release download $tag --repo $repo --pattern $devel --dir .

          Start-Process msiexec -ArgumentList "/i","$PWD\$runtime","/quiet","/norestart","ADDLOCAL=ALL" -Wait
          Start-Process msiexec -ArgumentList "/i","$PWD\$devel","/quiet","/norestart","ADDLOCAL=ALL" -Wait
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Configure GStreamer environment
        shell: pwsh
        run: |
          $gstRoot = (Get-ItemProperty "HKLM:\SOFTWARE\GStreamer1.0\x86_64" -ErrorAction SilentlyContinue).InstallDir
          if (-not $gstRoot) { $gstRoot = "C:\gstreamer\1.0\msvc_x86_64" }
          echo "PKG_CONFIG=$gstRoot\bin\pkg-config.exe"                >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=$gstRoot\lib\pkgconfig"                >> $env:GITHUB_ENV
          echo "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot\"             >> $env:GITHUB_ENV
          echo "$gstRoot\bin"                                          >> $env:GITHUB_PATH

      - name: Bundle GStreamer runtime
        shell: pwsh
        run: .\scripts\bundle-gstreamer.ps1

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PocketStream Desktop ${{ github.ref_name }}"
          releaseBody: "See the [commit log](https://github.com/RustRunner/PocketStream-Desktop/commits/${{ github.ref_name }}) for details."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
