name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      # The IPC contract (types.ts / tauri-api.ts) is hand-maintained;
      # typecheck is the cheapest drift net against the Rust side. Run
      # before the build so a contract break fails fast.
      - run: npm run typecheck
      - run: npm run build

  rust:
    name: Rust Checks (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # GStreamer dev libs via apt — fast, no bot-protection issues.
      # The Linux job exists to gate fmt/clippy/audit and to type-check
      # the cross-platform halves of the codebase. The Windows-only
      # halves (#[cfg(windows)]) are gated by the `windows` job below.
      - name: Install system dev libs (GStreamer + Tauri/GTK)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstrtspserver-1.0-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Tauri's generate_context!() macro requires the frontend dist
      # directory to exist, and tauri-build validates bundle resource
      # globs. Create all required paths that only exist after a full
      # build on Windows.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Create resource placeholders
        run: |
          mkdir -p src-tauri/resources/gstreamer/bin
          mkdir -p src-tauri/resources/gstreamer/lib/gstreamer-1.0
          mkdir -p src-tauri/resources/prerequisites
          touch src-tauri/resources/gstreamer/bin/.gitkeep
          touch src-tauri/resources/gstreamer/lib/gstreamer-1.0/.gitkeep
          touch src-tauri/resources/prerequisites/.gitkeep

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --no-deps -- -D warnings

  windows:
    name: Rust Compile (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Install the GStreamer SDK from upstream MSIs, pinned by URL and
      # SHA256. Both installers are required: the runtime MSI provides
      # the DLLs, the devel MSI provides the .lib import libraries that
      # gstreamer-rs needs at link time (build.rs delay-loads the DLLs
      # but link still resolves symbols against the .libs). Chocolatey
      # is not usable here: it stopped publishing gstreamer-devel after
      # 1.24.9, so the runtime and devel packages can no longer be
      # version-matched, and upstream prunes non-terminal patch MSIs
      # (1.24.13 is the terminal 1.24.x release). ADDLOCAL=ALL because
      # the crate links optional components (e.g. gstrtspserver) that a
      # default install omits. The MSIs install to
      # C:\gstreamer\1.0\msvc_x86_64\, which the environment step below
      # depends on.
      - name: Install GStreamer (MSVC x86_64)
        shell: pwsh
        run: |
          $base = 'https://gstreamer.freedesktop.org/data/pkg/windows/1.24.13/msvc'
          $msis = @(
            @{ Name = 'gstreamer-1.0-msvc-x86_64-1.24.13.msi'
               Sha256 = '66915D82ADDA34189703C36A5D2EF145D2E3AFB7AFC12C66FCF2EA506E2466D2' },
            @{ Name = 'gstreamer-1.0-devel-msvc-x86_64-1.24.13.msi'
               Sha256 = '0AFB4394C2CBA3999C0F5E74F28C2AC5D98F03131140E09246D4DCD60A0A0395' }
          )
          foreach ($msi in $msis) {
            $path = Join-Path $env:RUNNER_TEMP $msi.Name
            curl.exe -fsSL --retry 3 --retry-delay 5 -o $path "$base/$($msi.Name)"
            if ($LASTEXITCODE -ne 0) { throw "download failed: $($msi.Name)" }
            $hash = (Get-FileHash -Path $path -Algorithm SHA256).Hash
            if ($hash -ne $msi.Sha256) {
              throw "SHA256 mismatch for $($msi.Name): expected $($msi.Sha256), got $hash"
            }
            $proc = Start-Process msiexec.exe -Wait -PassThru `
              -ArgumentList '/i', $path, '/qn', 'ADDLOCAL=ALL'
            if ($proc.ExitCode -ne 0) {
              throw "msiexec exit $($proc.ExitCode) for $($msi.Name)"
            }
          }

      - name: Configure GStreamer environment
        shell: pwsh
        run: |
          # gstreamer-rs locates the SDK via this env var. The trailing
          # backslash matters — gstreamer-rs's build script joins paths
          # with raw concatenation in places.
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=C:\gstreamer\1.0\msvc_x86_64\" `
            | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG_PATH=C:\gstreamer\1.0\msvc_x86_64\lib\pkgconfig" `
            | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          # Put bin/ on PATH so any DLLs needed at link-stage helper-tool
          # invocation are resolvable.
          "C:\gstreamer\1.0\msvc_x86_64\bin" `
            | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # glib-sys / gstreamer-sys resolve their system deps via pkg-config,
      # which windows-latest lacks. pkgconfiglite 0.28 (the usual choco
      # option) mis-parses GStreamer's .pc files, so use the maintained
      # pkgconf that GStreamer's MSVC devel package bundles in bin/, and
      # point the pkg-config crate at it via the PKG_CONFIG env var (the
      # crate looks for an executable literally named "pkg-config", which
      # is why the bundled pkgconf isn't picked up on its own).
      - name: Use pkgconf for pkg-config resolution
        shell: pwsh
        run: |
          # Prefer the pkgconf GStreamer bundles; fall back to choco, then
          # the runner's preinstalled MSYS2. One of the three yields a
          # maintained pkgconf that parses GStreamer's .pc files.
          $pkgconf = $null
          $bundled = "C:\gstreamer\1.0\msvc_x86_64\bin\pkgconf.exe"
          if (Test-Path $bundled) { $pkgconf = $bundled }
          if (-not $pkgconf) {
            choco install pkgconf -y --no-progress
            $c = Get-Command pkgconf.exe -ErrorAction SilentlyContinue
            if ($c) { $pkgconf = $c.Source }
          }
          if (-not $pkgconf) {
            & C:\msys64\usr\bin\pacman.exe -S --needed --noconfirm mingw-w64-x86_64-pkgconf
            $m = "C:\msys64\mingw64\bin\pkgconf.exe"
            if (Test-Path $m) { $pkgconf = $m }
          }
          if (-not $pkgconf) { throw "Could not obtain pkgconf (GStreamer bin, choco, MSYS2 all failed)" }
          Write-Host "Using pkgconf: $pkgconf"
          & $pkgconf --version
          "PKG_CONFIG=$pkgconf" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          # The assumed lib\pkgconfig path did not actually contain
          # glib-2.0.pc (both pkg-config impls reported it missing), so
          # locate the real pkgconfig dir under the GStreamer root and set
          # PKG_CONFIG_PATH to it (forward slashes, accepted everywhere).
          # Dump the tree and fail loudly if the devel .pc files are absent.
          $root = "C:\gstreamer"
          $pc = Get-ChildItem -Path $root -Recurse -Filter "glib-2.0.pc" -File -ErrorAction SilentlyContinue
          if (-not $pc) {
            Write-Host "glib-2.0.pc NOT found under $root."
            Write-Host "=== directory tree under $root ==="
            Get-ChildItem -Path $root -Recurse -Directory -ErrorAction SilentlyContinue | Select-Object -First 150 -ExpandProperty FullName | ForEach-Object { Write-Host "  $_" }
            Write-Host "=== all .pc files under $root ==="
            Get-ChildItem -Path $root -Recurse -Filter "*.pc" -File -ErrorAction SilentlyContinue | Select-Object -First 80 -ExpandProperty FullName | ForEach-Object { Write-Host "  $_" }
            throw "glib-2.0.pc not present under $root"
          }
          $dirs = $pc | ForEach-Object { $_.DirectoryName.Replace('\','/') } | Sort-Object -Unique
          $pcPath = ($dirs -join ';')
          "PKG_CONFIG_PATH=$pcPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "glib-2.0.pc found; PKG_CONFIG_PATH=$pcPath"

      # tauri-build needs the frontend dist directory to exist and
      # validates bundle resource globs at compile time.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Create resource placeholders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\resources\gstreamer\bin | Out-Null
          New-Item -ItemType Directory -Force -Path src-tauri\resources\gstreamer\lib\gstreamer-1.0 | Out-Null
          New-Item -ItemType Directory -Force -Path src-tauri\resources\prerequisites | Out-Null
          New-Item -ItemType File -Force -Path src-tauri\resources\gstreamer\bin\.gitkeep | Out-Null
          New-Item -ItemType File -Force -Path src-tauri\resources\gstreamer\lib\gstreamer-1.0\.gitkeep | Out-Null
          New-Item -ItemType File -Force -Path src-tauri\resources\prerequisites\.gitkeep | Out-Null

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: windows

      # Compile the entire crate, including the #[cfg(windows)] halves
      # that the Linux job can't see. Tests aren't *run* — many depend on
      # local resources (GStreamer plugin registry, real network adapters)
      # and CI runners aren't a faithful production environment for them.
      # `cargo build --tests` still type-checks every test, which is the
      # actual gap we're closing here.
      - name: cargo build (lib + tests)
        working-directory: src-tauri
        run: cargo build --lib --tests

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo audit
        working-directory: src-tauri
        run: |
          cargo install cargo-audit --quiet
          # Advisory ignores are passed explicitly rather than via
          # audit.toml: cargo-audit does not read a project-local
          # audit.toml (only a global ~/.cargo/audit.toml), so the file's
          # ignores never applied. src-tauri/audit.toml is kept as the
          # rationale/revisit-date record; these flags mirror it.
          cargo audit \
            --ignore RUSTSEC-2024-0413 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195
