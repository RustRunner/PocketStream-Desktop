name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

  rust:
    name: Rust Clippy & Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install GStreamer
        run: choco install gstreamer gstreamer-devel --yes --no-progress

      - name: Configure GStreamer environment
        shell: pwsh
        run: |
          $gstRoot = (Get-ItemProperty "HKLM:\SOFTWARE\GStreamer1.0\x86_64" -ErrorAction SilentlyContinue).InstallDir
          if (-not $gstRoot) { $gstRoot = "C:\gstreamer\1.0\msvc_x86_64" }
          echo "PKG_CONFIG=$gstRoot\bin\pkg-config.exe"  >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=$gstRoot\lib\pkgconfig"  >> $env:GITHUB_ENV
          echo "$gstRoot\bin"                             >> $env:GITHUB_PATH

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
