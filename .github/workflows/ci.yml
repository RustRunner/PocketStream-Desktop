name: CI

on:
  push:
    # Every branch: work-in-progress branches carry release-blocking
    # fixes for days before a PR exists, and unexercised CI is how the
    # Windows job silently rotted last time. A branch that is also in a
    # PR runs twice; that redundancy is accepted for the simplicity.
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      # The IPC contract (types.ts / tauri-api.ts) is hand-maintained;
      # typecheck is the cheapest drift net against the Rust side. Run
      # before the build so a contract break fails fast.
      - run: npm run typecheck
      - run: npm run build

  rust:
    name: Rust Checks (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # GStreamer dev libs via apt — fast, no bot-protection issues.
      # The Linux job exists to gate fmt/clippy/audit and to type-check
      # the cross-platform halves of the codebase. The Windows-only
      # halves (#[cfg(windows)]) are gated by the `windows` job below.
      - name: Install system dev libs (GStreamer + Tauri/GTK)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstrtspserver-1.0-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Tauri's generate_context!() macro requires the frontend dist
      # directory to exist, and tauri-build validates bundle resource
      # globs. Create all required paths that only exist after a full
      # build on Windows.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Create resource placeholders
        run: |
          mkdir -p src-tauri/resources/gstreamer/bin
          mkdir -p src-tauri/resources/gstreamer/lib/gstreamer-1.0
          touch src-tauri/resources/gstreamer/bin/.gitkeep
          touch src-tauri/resources/gstreamer/lib/gstreamer-1.0/.gitkeep

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # --locked on every build-graph command: a Cargo.toml edited
      # without refreshing Cargo.lock must fail here, not re-resolve
      # silently to whatever the registry serves that day.
      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib --locked

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --no-deps --locked -- -D warnings

  windows:
    name: Rust Compile (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Install the GStreamer SDK from upstream MSIs, pinned by URL and
      # SHA256. Both installers are required: the runtime MSI provides
      # the DLLs, the devel MSI provides the .lib import libraries that
      # gstreamer-rs needs at link time (build.rs delay-loads the DLLs
      # but link still resolves symbols against the .libs). Chocolatey
      # is not usable here: it stopped publishing gstreamer-devel after
      # 1.24.9, so the runtime and devel packages can no longer be
      # version-matched. 1.26.11 is the newest MSI-based release — 1.28+
      # ship a single .exe installer instead. ADDLOCAL=ALL because the
      # crate links optional components (e.g. gstrtspserver) that a
      # default install omits. The MSIs install under Program Files, not
      # C:\gstreamer; the environment step below auto-detects the real
      # root from the installer-set env var.
      - name: Install GStreamer (MSVC x86_64)
        shell: pwsh
        run: |
          $base = 'https://gstreamer.freedesktop.org/data/pkg/windows/1.26.11/msvc'
          $msis = @(
            @{ Name = 'gstreamer-1.0-msvc-x86_64-1.26.11.msi'
               Sha256 = '31CBC21FA0950B5C1E79C80959B2799805CB05A7A35953A13A9F790776137605' },
            @{ Name = 'gstreamer-1.0-devel-msvc-x86_64-1.26.11.msi'
               Sha256 = 'AF0A0720692052AAF5FB0CF2847EF34A87016EF0F914328D516F049E6C86F587' }
          )
          foreach ($msi in $msis) {
            $path = Join-Path $env:RUNNER_TEMP $msi.Name
            curl.exe -fsSL --retry 3 --retry-delay 5 -o $path "$base/$($msi.Name)"
            if ($LASTEXITCODE -ne 0) { throw "download failed: $($msi.Name)" }
            $hash = (Get-FileHash -Path $path -Algorithm SHA256).Hash
            if ($hash -ne $msi.Sha256) {
              throw "SHA256 mismatch for $($msi.Name): expected $($msi.Sha256), got $hash"
            }
            $proc = Start-Process msiexec.exe -Wait -PassThru `
              -ArgumentList '/i', $path, '/qn', 'ADDLOCAL=ALL'
            if ($proc.ExitCode -ne 0) {
              throw "msiexec exit $($proc.ExitCode) for $($msi.Name)"
            }
          }

      - name: Configure GStreamer environment
        shell: pwsh
        run: |
          # The MSVC MSIs install to C:\Program Files\gstreamer (NOT
          # C:\gstreamer) and register GSTREAMER_1_0_ROOT_MSVC_X86_64.
          # Read that real root (machine then user scope), falling back to
          # the known default, and derive everything from it. GStreamer
          # bundles pkg-config.exe in bin/ and it self-locates its own .pc
          # files, so putting bin/ on PATH is all that's needed - no
          # separate pkg-config install. The trailing backslash on the
          # root matters: gstreamer-rs concatenates paths raw in places.
          $root = [Environment]::GetEnvironmentVariable('GSTREAMER_1_0_ROOT_MSVC_X86_64','Machine')
          if (-not $root) { $root = [Environment]::GetEnvironmentVariable('GSTREAMER_1_0_ROOT_MSVC_X86_64','User') }
          if (-not $root) { $root = 'C:\Program Files\gstreamer\1.0\msvc_x86_64\' }
          $root = $root.TrimEnd('\')
          $pc = Join-Path $root 'lib\pkgconfig\glib-2.0.pc'
          if (-not (Test-Path $pc)) { throw "glib-2.0.pc not found at $pc - GStreamer root '$root' is wrong" }
          Write-Host "GStreamer root: $root"
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$root\" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG_PATH=$root\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # tauri-build needs the frontend dist directory to exist and
      # validates bundle resource globs at compile time.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Create resource placeholders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\resources\gstreamer\bin | Out-Null
          New-Item -ItemType Directory -Force -Path src-tauri\resources\gstreamer\lib\gstreamer-1.0 | Out-Null
          New-Item -ItemType File -Force -Path src-tauri\resources\gstreamer\bin\.gitkeep | Out-Null
          New-Item -ItemType File -Force -Path src-tauri\resources\gstreamer\lib\gstreamer-1.0\.gitkeep | Out-Null

      # Build the shipping GStreamer bundle and prove it is self-sufficient.
      # The bundle script fails on any missing source DLL; the smoke check
      # then verifies the generated bundle actually provides the audio-path
      # elements with the system plugin directory masked, so the complete
      # SDK install on this runner cannot hide a bundle omission.
      - name: Bundle GStreamer runtime
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File scripts/bundle-gstreamer.ps1

      - name: Bundle smoke check (isolated plugin path)
        shell: pwsh
        run: |
          $bundle = Join-Path $pwd 'src-tauri\resources\gstreamer\lib\gstreamer-1.0'
          # Windows deletes an env var assigned an empty string, and an
          # unset GST_PLUGIN_SYSTEM_PATH_1_0 falls back to the default
          # system plugin dir — so isolation needs a real, empty directory.
          $emptyDir = Join-Path $env:RUNNER_TEMP 'no-system-plugins'
          New-Item -ItemType Directory -Force -Path $emptyDir | Out-Null
          $env:GST_PLUGIN_PATH_1_0        = $bundle
          $env:GST_PLUGIN_SYSTEM_PATH_1_0 = $emptyDir
          $env:GST_REGISTRY_1_0 = Join-Path $env:RUNNER_TEMP 'bundle-smoke-registry.bin'

          # Negative control: opusdec ships in the complete SDK install but
          # is deliberately not bundled. If it resolves, the isolation above
          # is broken and every positive check below is meaningless.
          gst-inspect-1.0.exe --exists opusdec
          if ($LASTEXITCODE -eq 0) { throw 'Smoke-check isolation broken: system plugins are visible' }

          $elements = @('rtppcmudepay','rtppcmadepay','mulawdec','alawdec',
                        'audioconvert','audioresample','volume','autoaudiosink',
                        'wasapi2sink','directsoundsink')
          $missing = foreach ($e in $elements) {
            gst-inspect-1.0.exe --exists $e
            if ($LASTEXITCODE -ne 0) { $e }
          }
          if ($missing) { throw "Bundle missing elements: $($missing -join ', ')" }
          Write-Host "All $($elements.Count) audio-path elements present in the bundle."

      # Guard the import surface of the audio plugins: every non-system DLL
      # they import must ship in the bundle's bin directory, or the installed
      # app fails to load them while CI (whose PATH holds the complete SDK)
      # stays green. First-level imports of exactly these seven DLLs —
      # deliberately not a general dependency walker.
      - name: Audit audio plugin imports against the bundle
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $dumpbin = & $vswhere -latest -find '**\Hostx64\x64\dumpbin.exe' | Select-Object -First 1
          if (-not $dumpbin) { throw 'dumpbin.exe not found on the runner' }
          $bundleBin = Join-Path $pwd 'src-tauri\resources\gstreamer\bin'
          $plugins = @('gstmulaw.dll','gstalaw.dll','gstaudioconvert.dll',
                       'gstaudioresample.dll','gstvolume.dll','gstwasapi2.dll','gstdirectsound.dll')
          # OS-inbox and VC-runtime imports the app already relies on.
          # MFPlat (Media Foundation) is inbox on every desktop SKU; on the
          # rare N-edition/Server-Core install without it, wasapi2 merely
          # fails to load and autoaudiosink falls back to directsound.
          $systemOk = '^(KERNEL32|USER32|ole32|DSOUND|MMDevAPI|AVRT|MFPlat|VCRUNTIME140(_1)?|MSVCP140|api-ms-win-.*)\.dll$'
          $gaps = foreach ($p in $plugins) {
            $file = Join-Path $pwd "src-tauri\resources\gstreamer\lib\gstreamer-1.0\$p"
            $deps = (& $dumpbin /dependents $file | Select-String -Pattern '^\s{4}\S+\.dll').Line.Trim()
            foreach ($d in $deps) {
              if ($d -notmatch $systemOk -and -not (Test-Path (Join-Path $bundleBin $d))) { "$p -> $d" }
            }
          }
          if ($gaps) { throw "Plugin imports missing from the bundle: $($gaps -join '; ')" }
          Write-Host 'All audio plugin imports resolve inside the bundle (or the OS/VC runtime).'

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: windows

      # Compile AND run the crate's tests, including the #[cfg(windows)]
      # halves the Linux job can't see — DPAPI credential-key handling
      # and the other Windows-only paths execute nowhere else. Tests
      # that genuinely need resources a runner can't provide are marked
      # #[ignore] in code, each with a reason string describing the
      # environment it needs, so the knowledge lives with the test.
      - name: cargo build (lib + tests)
        working-directory: src-tauri
        run: cargo build --lib --tests --locked

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib --locked

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo audit
        working-directory: src-tauri
        run: |
          cargo install cargo-audit --locked --quiet
          # Advisory ignores are passed explicitly rather than via
          # audit.toml: cargo-audit does not read a project-local
          # audit.toml (only a global ~/.cargo/audit.toml), so the file's
          # ignores never applied. src-tauri/audit.toml is kept as the
          # rationale/revisit-date record; these flags mirror it.
          cargo audit \
            --ignore RUSTSEC-2024-0413 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195

  compliance:
    name: Third-Party Notices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The notices/manifest/texts consistency check needs no GStreamer
      # install and no build — it cross-checks committed files only, so
      # a DLL added to the bundle manifest without a notices entry (or a
      # new npm dependency without one) fails here on every push.
      - name: Check third-party notices coverage
        shell: pwsh
        run: ./scripts/check-third-party.ps1

      # License gate for the crate graph: cargo-about resolves every
      # dependency license against the about.toml accept list and fails
      # on anything else, so an incompatible license surfaces on push,
      # not at release time. Only license resolution runs here (cargo
      # metadata, no build); the shipped file is generated by the
      # release workflow. cargo-about's binary lives behind the `cli`
      # feature — installing without it "succeeds" with no binary.
      - name: cargo about (license gate)
        working-directory: src-tauri
        run: |
          cargo install cargo-about --locked --quiet --features cli
          cargo about generate about.hbs -o /dev/null
