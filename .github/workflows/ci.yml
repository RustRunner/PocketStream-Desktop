name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

  rust:
    name: Rust Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # GStreamer MSVC runtime is required to link the gstreamer-rs crates.
      # Cache the install dir between runs — fresh install takes ~5 min,
      # cache restore takes <30 s.
      - name: Cache GStreamer install
        id: gst-cache
        uses: actions/cache@v4
        with:
          path: C:\gstreamer
          key: gstreamer-msvc-1.24.10-v1

      - name: Install GStreamer (MSVC x86_64)
        if: steps.gst-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://gstreamer.freedesktop.org/data/pkg/windows/1.24.10/msvc/gstreamer-1.0-msvc-x86_64-1.24.10.msi"
          $devUrl = "https://gstreamer.freedesktop.org/data/pkg/windows/1.24.10/msvc/gstreamer-1.0-devel-msvc-x86_64-1.24.10.msi"
          Invoke-WebRequest -Uri $url -OutFile gst-runtime.msi
          Invoke-WebRequest -Uri $devUrl -OutFile gst-devel.msi
          Start-Process msiexec.exe -ArgumentList '/i','gst-runtime.msi','/quiet','ADDLOCAL=ALL' -Wait
          Start-Process msiexec.exe -ArgumentList '/i','gst-devel.msi','/quiet','ADDLOCAL=ALL' -Wait

      - name: Set GStreamer environment
        shell: pwsh
        run: |
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=C:\gstreamer\1.0\msvc_x86_64\" | Out-File -FilePath $env:GITHUB_ENV -Append
          "C:\gstreamer\1.0\msvc_x86_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --no-deps -- -D warnings

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
