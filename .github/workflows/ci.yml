name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

  rust:
    name: Rust Checks (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # GStreamer dev libs via apt — fast, no bot-protection issues.
      # Windows-specific code (#[cfg(windows)]) is skipped by the
      # compiler on Linux; full Windows testing is done locally via
      # scripts/check.ps1 before pushing.
      - name: Install system dev libs (GStreamer + Tauri/GTK)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstrtspserver-1.0-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Tauri's build script validates bundle resource globs even during
      # cargo test. These directories only exist on Windows (populated
      # by scripts/bundle-gstreamer.ps1), so create empty placeholders.
      - name: Create resource placeholders
        run: |
          mkdir -p src-tauri/resources/gstreamer/bin
          mkdir -p src-tauri/resources/gstreamer/lib/gstreamer-1.0
          mkdir -p src-tauri/resources/prerequisites
          touch src-tauri/resources/gstreamer/bin/.gitkeep
          touch src-tauri/resources/gstreamer/lib/gstreamer-1.0/.gitkeep
          touch src-tauri/resources/prerequisites/.gitkeep

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --no-deps -- -D warnings

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri
