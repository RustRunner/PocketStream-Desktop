# cargo-audit configuration. Read automatically by `cargo audit` from
# the crate directory, so CI and the release workflow share one source
# of truth for advisory ignores.

[advisories]
ignore = [
    # RUSTSEC-2024-0413 — pulled in transitively; no fixed upstream
    # release is available and the vulnerable path is not reachable from
    # this app's usage. Revisit by 2026-10-01: check for a patched
    # upstream and drop this ignore if one exists.
    "RUSTSEC-2024-0413",
]
